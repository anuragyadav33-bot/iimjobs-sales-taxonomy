.nav{display:flex;gap:8px;margin-top:1.25rem}

.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn:disabled{opacity:.35;cursor:not-allowed}

.sum-val{font-size:13px;font-weight:600;color:#1A1A1A;flex:1}

footer{text-align:center;font-size:11px;color:#BBB;margin-top:1.5rem;padding-bottom:1rem}

function getVisibleNodes(indId) {
  var allowed = RELEVANCE[indId] || NODES.map(function(n){ return n.id; });
  return NODES.filter(function(n) {
    if (allowed.indexOf(n.id) < 0) return false;
    if (n.specInd && n.specInd !== indId) return false;
    return true;
  });
}

function getGroupedNodes(indId) {
  var visible = getVisibleNodes(indId);
  var groups = {};
  visible.forEach(function(n) {
    var gid = n.subclass_id;
    if (!groups[gid]) groups[gid] = {label: n.subclass_label, nodes: []};
    groups[gid].nodes.push(n);
  });
  return groups;
}

function getSpecLabel(node) {
  if (!node.specInd) return '';
  var ind = INDUSTRIES.find(function(i){ return i.id === node.specInd; });
  return ind ? ind.label.split(' ')[0] : node.specInd;
}

var step = 0, sel = {};

function getSel() {
  if (step === 0) return sel.ind;
  if (step === 1) return sel.dom;
  if (step === 2) return sel.node;
  if (step === 3) return sel.sen;
  return true;
}

function render() {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('sb' + i);
    el.className = 'step' + (i === step ? ' active' : i < step ? ' done' : '');
  }
  document.getElementById('pf').style.width = ((step + 1) / 5 * 100) + '%';
  document.getElementById('backBtn').style.display = step > 0 ? '' : 'none';
  var nb = document.getElementById('nextBtn');
  nb.disabled = !getSel();
  nb.style.display = step < 4 ? '' : 'none';
  if (step === 0) renderIndustry();
  else if (step === 1) renderDomain();
  else if (step === 2) renderNodes();
  else if (step === 3) renderSeniority();
  else renderSummary();
}

function pickInd(id) { sel.ind = id; sel.dom = null; sel.node = null; render(); }
function pickDom(id) { sel.dom = id; render(); }
function pickNode(id) { sel.node = id; render(); }
function pickSen(id) { sel.sen = id; render(); }

function renderIndustry() {
  var opts = '';
  INDUSTRIES.forEach(function(ind) {
    var eg = ind.domains.slice(0,3).map(function(d){return d.eg.split(',')[0].trim();}).join(', ');
    var cls = sel.ind === ind.id ? ' selected' : '';
    opts += '<div class="opt' + cls + '" onclick="pickInd(\'' + ind.id + '\')">'
      + '<div class="opt-label">' + ind.label + '</div>'
      + '<div class="opt-eg">' + eg + '</div></div>';
  });
  document.getElementById('content').innerHTML =
    '<div class="q">Which industry are you in?</div>'
    + '<div class="qsub">Select the industry that best describes your current or most recent company.</div>'
    + '<div class="options">' + opts + '</div>';
}

function renderDomain() {
  var ind = INDUSTRIES.find(function(i){ return i.id === sel.ind; });
  var opts = '';
  ind.domains.forEach(function(d) {
    var cls = sel.dom === d.id ? ' selected' : '';
    var ctag = d.cross_tags ? '<span class="badge">Also: Consumer Internet</span>' : '';
    opts += '<div class="opt' + cls + '" onclick="pickDom(\'' + d.id + '\')">'
      + '<div class="opt-label">' + d.label + ctag + '</div>'
      + '<div class="opt-eg">' + d.eg + '</div></div>';
  });
  document.getElementById('content').innerHTML =
    '<div class="q">Which part of ' + ind.label + '?</div>'
    + '<div class="qsub">This helps us match you to roles within the right sub-sector.</div>'
    + '<div class="options">' + opts + '</div>';
}

function renderNodes() {
  var ind = INDUSTRIES.find(function(i){ return i.id === sel.ind; });
  var groups = getGroupedNodes(sel.ind);
  var nodeCount = getVisibleNodes(sel.ind).length;
  var html = '<div class="q">What best describes what you do?</div>'
    + '<div class="qsub">Showing ' + nodeCount + ' roles relevant to ' + ind.label + '. Pick your primary role based on where your main KPI sits.</div>';
  var gkeys = Object.keys(groups);
  if (!gkeys.length) {
    html += '<div style="color:var(--color-text-secondary);font-size:13px;padding:1rem">No roles found for this industry. Please go back and select a different industry.</div>';
  }
  gkeys.forEach(function(gid) {
    var g = groups[gid];
    if (!g.nodes.length) return;
    var opts = '';
    g.nodes.forEach(function(n) {
      var cls = sel.node === n.id ? ' selected' : '';
      var feat = n.specInd ? ' featured' : '';
      var badge = n.specInd ? '<span class="badge">' + getSpecLabel(n) + '</span>' : '';
      opts += '<div class="opt' + cls + feat + '" onclick="pickNode(\'' + n.id + '\')">'
        + '<div class="opt-label">' + n.clabel + badge + '</div>'
        + '<div class="opt-sub">' + n.cdesc + '</div>'
        + '<div class="opt-eg">' + n.titles + '</div></div>';
    });
    html += '<div class="group-label">' + g.label + '</div><div class="options">' + opts + '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

    + '<div class="sum-row"><span class="sum-lbl">Seniority</span><span class="sum-val">' + (sen ? sen.label : '-')
    + (sel.yoe ? ' <span style="font-size:11px;color:#888">' + sel.yoe + ' yrs exp</span>' : '') + '</span></div>'
    + (sel.geo ? '<div class="sum-row"><span class="sum-lbl">Geography</span><span class="sum-val">' + sel.geo + '</span></div>' : '')
    + '</div>'
    + '<div class="confirm-note">This is how we match jobs to your profile. You can update this anytime from your profile settings.</div>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="btn" onclick="goBack()">Edit</button>'
    + '<button class="btn primary" onclick="alert(\'Profile saved!\')">Confirm &amp; continue</button></div>';
}

function goNext() { if (!getSel()) return; step = Math.min(4, step + 1); render(); }
function goBack() { step = Math.max(0, step - 1); document.getElementById('nav').style.display = 'flex'; render(); }

render();

</script>
</body>
</html>
