function isNodeVisibleForIndustry(node, indId) {
  // showFor restriction - e.g. kam_trade only for fmcg/retail
  if (node.showFor && node.showFor.length) {
    return node.showFor.indexOf(indId) >= 0;
  }
  // specInd restriction
  if (node.specInd && node.specInd !== indId) return false;
  return true;
}

function getClusterGroups(indId) {
  var rel = RELEVANCE[indId] || {clusters: DISPLAY_ORDER, extras: []};
  var extrasSeen = {};
  (rel.extras||[]).forEach(function(e){ extrasSeen[e] = true; });
  var groups = [];

  DISPLAY_ORDER.forEach(function(cid) {
    if ((rel.clusters||[]).indexOf(cid) < 0) return;
    var meta = CLUSTER_META[cid];
    var nodeIds = (CLUSTERS[cid]||[]).filter(function(nid) {
      var node = NODES.find(function(n){ return n.id === nid; });
      if (!node) return false;
      // For FMCG and Retail: hide account_management, show kam_trade instead
      if (nid === 'account_management' && (indId === 'fmcg' || indId === 'retail')) return false;
      // For non-FMCG/Retail: hide kam_trade
      if (nid === 'kam_trade' && indId !== 'fmcg' && indId !== 'retail') return false;
      // For non-BFSI/Fintech: hide wealth_rm
      if (nid === 'wealth_rm' && indId !== 'bfsi' && indId !== 'fintech') return false;
      return isNodeVisibleForIndustry(node, indId);
    });
    if (!nodeIds.length) return;
    groups.push({cid: cid, label: meta.label, desc: meta.desc, nodeIds: nodeIds});
  });

  // B2G
  if (extrasSeen['b2g_sales']) {
    groups.push({cid:'B2G', label:'Government & Public Sector', desc:'Tender-driven, PSU and government account management.', nodeIds:['b2g_sales']});
  }

  return groups;
}

function getSpecLabel(node) {
  if (!node.specInd) return '';
  var ind = INDUSTRIES.find(function(i){ return i.id === node.specInd; });
  return ind ? ind.label.split(' ')[0] : node.specInd;
}

var step = 0, sel = {};

function getSel() {
  if (step===0) return sel.ind;
  if (step===1) return sel.dom;
  if (step===2) return sel.node;
  if (step===3) return sel.sen;
  return true;
}

function render() {
  for (var i=0;i<4;i++) {
    document.getElementById('sb'+i).className='step'+(i===step?' active':i<step?' done':'');
  }
  document.getElementById('pf').style.width=((step+1)/5*100)+'%';
  document.getElementById('backBtn').style.display=step>0?'':'none';
  var nb=document.getElementById('nextBtn');
  nb.disabled=!getSel();
  nb.style.display=step<4?'':'none';
  if (step===0) renderIndustry();
  else if (step===1) renderDomain();
  else if (step===2) renderNodes();
  else if (step===3) renderSeniority();
  else renderSummary();
}

function pickInd(id){sel.ind=id;sel.dom=null;sel.node=null;render();}
function pickDom(id){sel.dom=id;render();}
function pickNode(id){sel.node=id;render();}
function pickSen(id){sel.sen=id;render();}

function renderIndustry(){
  var opts='';
  INDUSTRIES.forEach(function(ind){
    var eg=ind.domains.slice(0,3).map(function(d){return d.eg.split(',')[0].trim();}).join(', ');
    opts+='<div class="opt'+(sel.ind===ind.id?' selected':'')+'" onclick="pickInd(\''+ind.id+'\')">'
      +'<div class="opt-label">'+ind.label+'</div><div class="opt-eg">'+eg+'</div></div>';
  });
  document.getElementById('content').innerHTML=
    '<div class="q">Which industry are you in?</div>'
    +'<div class="qsub">Select the industry that best describes your current or most recent company.</div>'
    +'<div class="options">'+opts+'</div>';
}

}

function renderNodes(){
  var ind=INDUSTRIES.find(function(i){return i.id===sel.ind;});
  var groups=getClusterGroups(sel.ind);
  var total=groups.reduce(function(s,g){return s+g.nodeIds.length;},0);
  var COLORS={C1:'cluster-blue',C4:'cluster-green',C5:'cluster-coral',C6:'cluster-purple',
    C2a:'cluster-teal',C2b:'cluster-teal',C7:'cluster-gray',B2G:'cluster-dark'};
  var html='<div class="q">What type of Sales work do you do?</div>'
    +'<div class="qsub">Showing '+total+' role types relevant to '+ind.label+'. Roles are grouped by skill type.</div>';
  groups.forEach(function(g){
    if (!g.nodeIds.length) return;
    var cc=COLORS[g.cid]||'cluster-gray';
    var opts='';
    g.nodeIds.forEach(function(nid){
      var node=NODES.find(function(n){return n.id===nid;});
      if (!node) return;
      var badge=node.specInd?'<span class="badge">'+getSpecLabel(node)+'</span>':'';
      opts+='<div class="opt'+(sel.node===nid?' selected':'')+(node.specInd?' featured':'')+'" onclick="pickNode(\''+nid+'\')">'

      +'<div class="cluster-desc">'+g.desc+'</div></div>'

}

    +'<input type="number" id="yoeInput" min="0" max="40" placeholder="e.g. 12" '
    +'style="padding:8px 12px;border:1.5px solid #DDD;border-radius:8px;font-size:14px;width:160px" '
    +'value="'+(sel.yoe||'')+'" oninput="sel.yoe=this.value"></div>'
    +'<div style="margin-top:1rem"><label style="font-size:12px;color:#666;display:block;margin-bottom:6px">Geography (optional)</label>'
    +'<select id="geoInput" onchange="sel.geo=this.value" style="padding:8px 12px;border:1.5px solid #DDD;border-radius:8px;font-size:13px;width:220px">'
    +'<option value="">India (default)</option>'
    +'<option value="us_na">US / North America</option>'
    +'<option value="emea">EMEA</option>'
    +'<option value="apac">APAC</option>'
    +'<option value="me">Middle East</option>'
    +'<option value="global">Global</option>'
    +'</select></div>';
}

function renderSummary(){
  var ind=INDUSTRIES.find(function(i){return i.id===sel.ind;});
  var dom=ind?ind.domains.find(function(d){return d.id===sel.dom;}):null;
  var node=NODES.find(function(n){return n.id===sel.node;});
  var sen=SENIORITY.find(function(s){return s.id===sel.sen;});
  var clusterLabel='';
  Object.keys(CLUSTERS).forEach(function(cid){
    if ((CLUSTERS[cid]||[]).indexOf(sel.node)>=0) clusterLabel=CLUSTER_META[cid]?CLUSTER_META[cid].label:'';
  });
  if (sel.node==='b2g_sales') clusterLabel='Government & Public Sector';
  var isLeader=sen&&['director','vp','cxo'].indexOf(sen.id)>=0&&sel.yoe&&parseInt(sel.yoe)>=12;
  document.getElementById('nav').style.display='none';
  document.getElementById('content').innerHTML=
    '<div class="q" style="margin-bottom:.75rem">Your profile confirmed</div>'
    +'<div class="summary">'
    +'<div class="sum-row"><span class="sum-lbl">Industry</span><span class="sum-val">'+(ind?ind.label:'-')+'</span></div>'
    +'<div class="sum-row"><span class="sum-lbl">Domain</span><span class="sum-val">'+(dom?dom.label:'-')+'</span></div>'
    +'<div class="sum-row"><span class="sum-lbl">Cluster</span><span class="sum-val" style="color:#185FA5">'+clusterLabel+'</span></div>'
    +'<div class="sum-row"><span class="sum-lbl">Role</span><span class="sum-val">'+(node?node.label:'-')
    +'<span class="sum-node">'+(node?node.id:'')+'</span></span></div>'
    +'<div class="sum-row"><span class="sum-lbl">Seniority</span><span class="sum-val">'+(sen?sen.label:'-')
    +(sel.yoe?' <span style="font-size:11px;color:#888">'+sel.yoe+' yrs exp</span>':'')+'</span></div>'
    +(isLeader?'<div class="sum-row"><span class="sum-lbl">Also matched</span><span class="sum-val" style="color:#1D9E75">Sales Leadership roles (VP Sales, Sales Head, CSO)</span></div>':'')
    +(sel.geo?'<div class="sum-row"><span class="sum-lbl">Geography</span><span class="sum-val">'+sel.geo+'</span></div>':'')
    +'</div>'
    +'<div class="confirm-note">This is how we match jobs to your profile. You can update this anytime from your profile settings.</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn" onclick="goBack()">Edit</button>'
    +'<button class="btn primary" onclick="alert(\'Profile saved!\')">Confirm &amp; continue</button></div>';
}

function goNext(){if(!getSel())return;step=Math.min(4,step+1);render();}
function goBack(){step=Math.max(0,step-1);document.getElementById('nav').style.display='flex';render();}

render();

</script>
</body>
</html>
